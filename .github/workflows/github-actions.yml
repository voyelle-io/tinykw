name: TinyKW CI

on:
  workflow_dispatch: 
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            plat_tag: manylinux_2_17_x86_64
            lib_src: libs/linux-x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            plat_tag: manylinux_2_17_aarch64
            lib_src: libs/linux-arm64
          - os: macos-15
            arch: arm64
            plat_tag: macosx_12_0_arm64
            lib_src: libs/macos-arm64
          - os: macos-15-intel
            arch: x86_64
            plat_tag: macosx_12_0_x86_64
            lib_src: libs/macos-x86_64
          - os: windows-latest
            arch: x86_64
            plat_tag: win_amd64
            lib_src: libs/windows-x86_64
          # very slow so commented for the moment
          #- os: windows-11-arm
          #  plat_tag: win_arm64
          #  lib_src: libs/windows-arm64
        #os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build deps
      run: pip install build wheel

    # Copy only this platform's binaries
    - name: Stage binary
      shell: bash
      run: |
        mkdir -p python-binding/src/tinykw/libs
        cp -r ${{ matrix.lib_src }}/* python-binding/src/tinykw/libs/

    - name: Build wheel
      working-directory: python-binding
      env:
        WHEEL_PLAT_TAG: ${{ matrix.plat_tag }}
      run: python -m build --wheel

    - name: Test (install wheel directly)
      shell: bash
      run: |
        pip install --find-links python-binding/dist tinykw[dev]
        pytest python-binding/tests/

    # this uploads the wheels as artifacts
    - uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.plat_tag }}
        path: python-binding/dist/*.whl

  # this download the artifacts and push them to pypi (if the github commit is a release)
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
